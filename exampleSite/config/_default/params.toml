#################### default parameters ################################
logo = "images/logo-nav.png"
logo_width = "110px"

######################### Color & Font Variables #####################
[variables]
# Dark navy background — all site sections use this as base
body_color        = "#0A192F"
# Paragraph / body text
text_color        = "#94a3b8"
# Headings and high-contrast text
text_color_dark   = "#F8F9FA"
# Brand blue used on primary buttons, icons, links
primary_color     = "#0078D7"
# Card borders and subtle dividers
border_color      = "#1e3050"
# Generic black reference
black             = "#060f1e"
# Generic white reference
white             = "#F8F9FA"
# Light accent (used on bg-light sections)
light             = "#0d2137"
# Google Fonts (Montserrat headings + Roboto body)
primary_font      = "Montserrat:wght@400;600;700;800"
primary_font_type = "sans-serif"
secondary_font    = "Roboto:wght@400;500"
# OpenGraph / Twitter Card metadata
description = "This is meta description"
author = "ZILJ tech"
image = "images/logo.png" # this image will be used as fallback if a page has no image of its own
# contact form action
contact_form_action = "#" # contact form works with https://formspree.io

# Type of pages to be rendered with a blog view
blogCategoryType = "category"

# Preloader
[preloader]
enable = true
preloader = "" # use jpg, png, svg or gif format.

# Navigation buttons
[navigation_button]
enable = true
label = "Get Started"
link = "contact"

# cookies
[cookies]
enable = false
expire_days = 2
content = "This site uses cookies. By continuing to use this website, you agree to their use."
button = "I Accept"
  

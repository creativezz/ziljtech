<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="blue2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D7"/>
      <stop offset="100%" stop-color="#00CCCC"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0078D7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00CCCC" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow2">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeglow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="400" fill="url(#bg2)" rx="16"/>

  <!-- Background glow blobs -->
  <ellipse cx="280" cy="200" rx="160" ry="130" fill="#0078D7" opacity="0.04" filter="url(#softglow2)"/>
  <ellipse cx="100" cy="300" rx="80" ry="60" fill="#00CCCC" opacity="0.05"/>
  <ellipse cx="460" cy="100" rx="70" ry="50" fill="#0078D7" opacity="0.05"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#0078D7" stroke-width="1">
    <line x1="0" y1="80" x2="560" y2="80"/>
    <line x1="0" y1="160" x2="560" y2="160"/>
    <line x1="0" y1="240" x2="560" y2="240"/>
    <line x1="0" y1="320" x2="560" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
  </g>

  <!-- ── Central Shield ── -->
  <!-- Shield glow bg -->
  <ellipse cx="280" cy="195" rx="70" ry="75" fill="#0078D7" opacity="0.08" filter="url(#softglow2)"/>

  <!-- Shield shape -->
  <path d="M280 110 L330 135 L330 185 Q330 230 280 255 Q230 230 230 185 L230 135 Z"
        fill="url(#shieldGrad)" stroke="url(#blue2)" stroke-width="2" filter="url(#glow2)"/>

  <!-- Shield inner lines -->
  <path d="M280 120 L322 142 L322 183 Q322 222 280 244"
        fill="none" stroke="#0078D7" stroke-width="0.8" opacity="0.4"/>
  <path d="M280 120 L238 142 L238 183 Q238 222 280 244"
        fill="none" stroke="#0078D7" stroke-width="0.8" opacity="0.4"/>

  <!-- Shield checkmark / lock icon -->
  <rect x="268" y="165" width="24" height="20" rx="4" fill="none" stroke="url(#blue2)" stroke-width="2"/>
  <path d="M273 165 L273 160 Q273 150 280 150 Q287 150 287 160 L287 165" fill="none" stroke="url(#blue2)" stroke-width="2"/>
  <circle cx="280" cy="175" r="3" fill="url(#blue2)"/>
  <line x1="280" y1="178" x2="280" y2="182" stroke="url(#blue2)" stroke-width="2"/>

  <!-- ── Orbiting security nodes ── -->
  <!-- Orbit ring -->
  <ellipse cx="280" cy="195" rx="105" ry="85" fill="none" stroke="#0078D7" stroke-width="1" stroke-dasharray="6 4" opacity="0.3"/>

  <!-- Node 1: top (Firewall) -->
  <circle cx="280" cy="110" r="18" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#nodeglow)"/>
  <text x="280" y="115" font-family="Arial" font-size="14" text-anchor="middle" fill="#0078D7">🔥</text>

  <!-- Node 2: right (Encryption) -->
  <circle cx="385" cy="195" r="18" fill="#0d2137" stroke="#00CCCC" stroke-width="1.5" filter="url(#nodeglow)"/>
  <text x="385" y="200" font-family="Arial" font-size="14" text-anchor="middle" fill="#00CCCC">🔐</text>

  <!-- Node 3: bottom (Monitoring) -->
  <circle cx="280" cy="280" r="18" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#nodeglow)"/>
  <text x="280" y="285" font-family="Arial" font-size="14" text-anchor="middle" fill="#0078D7">👁</text>

  <!-- Node 4: left (Shield) -->
  <circle cx="175" cy="195" r="18" fill="#0d2137" stroke="#00CCCC" stroke-width="1.5" filter="url(#nodeglow)"/>
  <text x="175" y="200" font-family="Arial" font-size="14" text-anchor="middle" fill="#00CCCC">🛡</text>

  <!-- Node labels -->
  <text x="280" y="100" font-family="Arial" font-size="8" text-anchor="middle" fill="#64748b">Firewall</text>
  <text x="413" y="198" font-family="Arial" font-size="8" text-anchor="middle" fill="#64748b">Encryption</text>
  <text x="280" y="308" font-family="Arial" font-size="8" text-anchor="middle" fill="#64748b">Monitor</text>
  <text x="143" y="198" font-family="Arial" font-size="8" text-anchor="middle" fill="#64748b">Defense</text>

  <!-- Connection lines from shield to nodes -->
  <line x1="280" y1="128" x2="280" y2="145" stroke="#0078D7" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="330" y1="175" x2="367" y2="185" stroke="#00CCCC" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="280" y1="255" x2="280" y2="262" stroke="#0078D7" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="230" y1="175" x2="193" y2="185" stroke="#00CCCC" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>

  <!-- ── Left panel: threat monitor ── -->
  <rect x="22" y="40" width="130" height="145" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="87" y="62" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA" text-anchor="middle">Threat Monitor</text>
  <line x1="32" y1="70" x2="142" y2="70" stroke="#1e3050" stroke-width="1"/>

  <!-- Threat rows -->
  <circle cx="42" cy="88" r="5" fill="#ef4444"/>
  <text x="52" y="92" font-family="Arial" font-size="9" fill="#94a3b8">SQL Injection</text>
  <text x="138" y="92" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="end">HIGH</text>

  <circle cx="42" cy="108" r="5" fill="#f59e0b"/>
  <text x="52" y="112" font-family="Arial" font-size="9" fill="#94a3b8">XSS Attack</text>
  <text x="138" y="112" font-family="Arial" font-size="9" fill="#f59e0b" text-anchor="end">MED</text>

  <circle cx="42" cy="128" r="5" fill="#22c55e"/>
  <text x="52" y="132" font-family="Arial" font-size="9" fill="#94a3b8">Brute Force</text>
  <text x="138" y="132" font-family="Arial" font-size="9" fill="#22c55e" text-anchor="end">LOW</text>

  <circle cx="42" cy="148" r="5" fill="#ef4444"/>
  <text x="52" y="152" font-family="Arial" font-size="9" fill="#94a3b8">DDoS Probe</text>
  <text x="138" y="152" font-family="Arial" font-size="9" fill="#ef4444" text-anchor="end">HIGH</text>

  <circle cx="42" cy="168" r="5" fill="#22c55e"/>
  <text x="52" y="172" font-family="Arial" font-size="9" fill="#94a3b8">Port Scan</text>
  <text x="138" y="172" font-family="Arial" font-size="9" fill="#22c55e" text-anchor="end">LOW</text>

  <!-- ── Right panel: security score ── -->
  <rect x="408" y="40" width="130" height="145" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="473" y="62" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA" text-anchor="middle">Security Score</text>
  <line x1="418" y1="70" x2="528" y2="70" stroke="#1e3050" stroke-width="1"/>

  <!-- Score arc -->
  <circle cx="473" cy="115" r="34" fill="none" stroke="#1e3050" stroke-width="6"/>
  <circle cx="473" cy="115" r="34" fill="none" stroke="url(#blue2)" stroke-width="6"
          stroke-dasharray="178 214" stroke-dashoffset="53" stroke-linecap="round" filter="url(#glow2)"/>
  <text x="473" y="111" font-family="Arial" font-size="20" font-weight="800" fill="url(#blue2)" text-anchor="middle">98</text>
  <text x="473" y="124" font-family="Arial" font-size="8" fill="#94a3b8" text-anchor="middle">/ 100</text>
  <text x="473" y="166" font-family="Arial" font-size="9" fill="#22c55e" text-anchor="middle">● Excellent</text>

  <!-- ── Bottom status bar ── -->
  <rect x="22" y="310" width="516" height="68" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="42" y="332" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">Security Status</text>

  <!-- Status items -->
  <rect x="42" y="340" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="55" y="348" font-family="Arial" font-size="9" fill="#94a3b8">SSL Active</text>

  <rect x="130" y="340" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="143" y="348" font-family="Arial" font-size="9" fill="#94a3b8">2FA Enabled</text>

  <rect x="230" y="340" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="243" y="348" font-family="Arial" font-size="9" fill="#94a3b8">Encrypted</text>

  <rect x="320" y="340" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="333" y="348" font-family="Arial" font-size="9" fill="#94a3b8">Audit Pending</text>

  <rect x="430" y="340" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="443" y="348" font-family="Arial" font-size="9" fill="#94a3b8">Patched</text>

  <text x="42" y="368" font-family="Arial" font-size="9" fill="#475569">Last scan: 2 minutes ago  ·  0 critical vulnerabilities  ·  Next scan in 58 min</text>

  <!-- Pulse animation dots -->
  <circle cx="500" cy="332" r="5" fill="#22c55e" opacity="0.9" filter="url(#glow2)"/>
  <circle cx="510" cy="332" r="3" fill="#22c55e" opacity="0.5"/>
  <text x="496" y="348" font-family="Arial" font-size="8" fill="#22c55e" text-anchor="middle">LIVE</text>

  <!-- ── Left lower panel ── -->
  <rect x="22" y="200" width="130" height="95" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="87" y="220" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA" text-anchor="middle">Incidents</text>
  <line x1="32" y1="226" x2="142" y2="226" stroke="#1e3050" stroke-width="1"/>
  <text x="87" y="256" font-family="Arial" font-size="30" font-weight="800" fill="url(#blue2)" text-anchor="middle">0</text>
  <text x="87" y="272" font-family="Arial" font-size="9" fill="#22c55e" text-anchor="middle">● All Clear</text>
  <text x="87" y="286" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">This Month</text>

  <!-- ── Right lower panel ── -->
  <rect x="408" y="200" width="130" height="95" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="473" y="220" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA" text-anchor="middle">Uptime</text>
  <line x1="418" y1="226" x2="528" y2="226" stroke="#1e3050" stroke-width="1"/>
  <text x="473" y="256" font-family="Arial" font-size="24" font-weight="800" fill="#00CCCC" text-anchor="middle">99.9%</text>
  <text x="473" y="272" font-family="Arial" font-size="9" fill="#22c55e" text-anchor="middle">● Protected</text>
  <text x="473" y="286" font-family="Arial" font-size="8" fill="#475569" text-anchor="middle">365 days</text>
</svg>

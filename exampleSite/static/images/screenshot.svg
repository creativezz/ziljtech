  <text x="641" y="118" font-family="Arial" font-size="17" font-weight="800" fill="url(#scBlue)" text-anchor="middle">50+</text>

  <rect x="695" y="82" width="92" height="50" rx="10" fill="#0A192F" stroke="#1e3050" stroke-width="1"/>

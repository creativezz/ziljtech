  <rect x="30" y="30" width="340" height="40" rx="14" fill="#0f2340"/>
  <rect x="30" y="52" width="340" height="18" fill="#0f2340"/>
  <circle cx="52" cy="50" r="6" fill="#ef4444" opacity="0.7"/>
  <circle cx="68" cy="50" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="84" cy="50" r="6" fill="#22c55e" opacity="0.7"/>
  <text x="200" y="54" font-family="Arial" font-size="10" fill="#475569" text-anchor="middle">ziljtech-deploy.sh</text>

  <!-- Code lines -->
  <text x="50" y="90" font-family="Courier New, monospace" font-size="11" fill="#475569">$</text>
  <text x="62" y="90" font-family="Courier New, monospace" font-size="11" fill="#94a3b8">npm run build</text>

  <text x="50" y="108" font-family="Courier New, monospace" font-size="11" fill="#22c55e">✓</text>
  <text x="62" y="108" font-family="Courier New, monospace" font-size="11" fill="#64748b">Build complete (3.2s)</text>

  <text x="50" y="126" font-family="Courier New, monospace" font-size="11" fill="#475569">$</text>
  <text x="62" y="126" font-family="Courier New, monospace" font-size="11" fill="#94a3b8">docker push zilj/api:v2.4</text>

  <text x="50" y="144" font-family="Courier New, monospace" font-size="11" fill="#0078D7">▶</text>
  <text x="62" y="144" font-family="Courier New, monospace" font-size="11" fill="#64748b">Pushing layers... 100%</text>

  <text x="50" y="162" font-family="Courier New, monospace" font-size="11" fill="#22c55e">✓</text>
  <text x="62" y="162" font-family="Courier New, monospace" font-size="11" fill="#64748b">Deployed to Kubernetes</text>

  <text x="50" y="180" font-family="Courier New, monospace" font-size="11" fill="#475569">$</text>
  <text x="62" y="180" font-family="Courier New, monospace" font-size="11" fill="#94a3b8">terraform apply --auto</text>

  <text x="50" y="198" font-family="Courier New, monospace" font-size="11" fill="#22c55e">✓</text>
  <text x="62" y="198" font-family="Courier New, monospace" font-size="11" fill="#64748b">Infrastructure updated</text>

  <text x="50" y="216" font-family="Courier New, monospace" font-size="11" fill="#475569">$</text>
  <text x="62" y="216" font-family="Courier New, monospace" font-size="11" fill="#94a3b8">pytest --cov=app tests/</text>

  <text x="50" y="234" font-family="Courier New, monospace" font-size="11" fill="#22c55e">✓</text>
  <text x="62" y="234" font-family="Courier New, monospace" font-size="11" fill="#64748b">248 passed, 0 failed</text>

  <text x="50" y="252" font-family="Courier New, monospace" font-size="11" fill="#00CCCC">▶</text>
  <text x="62" y="252" font-family="Courier New, monospace" font-size="11" fill="#94a3b8">All systems nominal</text>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="scBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060f1e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="scBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D7"/>
      <stop offset="100%" stop-color="#00CCCC"/>
    </linearGradient>
    <linearGradient id="scArea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0078D7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0078D7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scArea2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00CCCC" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00CCCC" stop-opacity="0"/>
    </linearGradient>
    <filter id="scGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scSoft">
      <feGaussianBlur stdDeviation="25" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="mainClip">
      <rect x="0" y="0" width="1200" height="340" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#scBg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="300" cy="170" rx="300" ry="180" fill="#0078D7" opacity="0.04" filter="url(#scSoft)"/>
  <ellipse cx="900" cy="170" rx="280" ry="160" fill="#00CCCC" opacity="0.04" filter="url(#scSoft)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#0078D7" stroke-width="1">
    <line x1="0" y1="68" x2="1200" y2="68"/>
    <line x1="0" y1="136" x2="1200" y2="136"/>
    <line x1="0" y1="204" x2="1200" y2="204"/>
    <line x1="0" y1="272" x2="1200" y2="272"/>
    <line x1="150" y1="0" x2="150" y2="340"/>
    <line x1="300" y1="0" x2="300" y2="340"/>
    <line x1="450" y1="0" x2="450" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="750" y1="0" x2="750" y2="340"/>
    <line x1="900" y1="0" x2="900" y2="340"/>

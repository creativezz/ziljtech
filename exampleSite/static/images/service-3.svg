<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="blue3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D7"/>
      <stop offset="100%" stop-color="#00CCCC"/>
    </linearGradient>
    <linearGradient id="lineUp" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0078D7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0078D7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="lineCyan" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00CCCC" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00CCCC" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow3">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neuronglow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="30" y="70" width="230" height="165"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="560" height="400" fill="url(#bg3)" rx="16"/>

  <!-- Background glow blobs -->
  <ellipse cx="150" cy="200" rx="120" ry="100" fill="#0078D7" opacity="0.04" filter="url(#softglow3)"/>
  <ellipse cx="420" cy="200" rx="120" ry="100" fill="#00CCCC" opacity="0.04" filter="url(#softglow3)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#0078D7" stroke-width="1">
    <line x1="0" y1="80" x2="560" y2="80"/>
    <line x1="0" y1="160" x2="560" y2="160"/>
    <line x1="0" y1="240" x2="560" y2="240"/>
    <line x1="0" y1="320" x2="560" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
  </g>

  <!-- ══ LEFT: Analytics Chart Panel ══ -->
  <rect x="22" y="30" width="250" height="200" rx="14" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>

  <!-- Panel header -->
  <rect x="22" y="30" width="250" height="40" rx="14" fill="#0f2340"/>
  <rect x="22" y="52" width="250" height="18" fill="#0f2340"/>
  <circle cx="44" cy="50" r="6" fill="#0078D7" opacity="0.8"/>
  <circle cx="59" cy="50" r="6" fill="#00CCCC" opacity="0.6"/>
  <text x="78" y="54" font-family="Arial" font-size="11" font-weight="600" fill="#94a3b8">Data Analytics</text>

  <!-- Area chart background fill -->
  <!-- Blue area -->
  <polygon points="40,195 40,155 70,140 100,125 130,110 160,118 190,95 220,105 250,88 250,195"
           fill="url(#lineUp)" opacity="0.3" clip-path="url(#chartClip)"/>
  <!-- Cyan area -->
  <polygon points="40,195 40,170 70,162 100,148 130,158 160,142 190,130 220,140 250,120 250,195"
           fill="url(#lineCyan)" opacity="0.25" clip-path="url(#chartClip)"/>

  <!-- Blue line -->
  <polyline points="40,155 70,140 100,125 130,110 160,118 190,95 220,105 250,88"
            fill="none" stroke="#0078D7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow3)" clip-path="url(#chartClip)"/>
  <!-- Cyan line -->
  <polyline points="40,170 70,162 100,148 130,158 160,142 190,130 220,140 250,120"
            fill="none" stroke="#00CCCC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow3)" clip-path="url(#chartClip)"/>

  <!-- Data points on blue line -->
  <circle cx="40" cy="155" r="3.5" fill="#0078D7" filter="url(#glow3)"/>
  <circle cx="100" cy="125" r="3.5" fill="#0078D7" filter="url(#glow3)"/>
  <circle cx="160" cy="118" r="3.5" fill="#0078D7" filter="url(#glow3)"/>
  <circle cx="220" cy="105" r="3.5" fill="#0078D7" filter="url(#glow3)"/>
  <circle cx="250" cy="88" r="5" fill="#0078D7" filter="url(#glow3)"/>

  <!-- Data points on cyan line -->
  <circle cx="40" cy="170" r="3" fill="#00CCCC"/>
  <circle cx="100" cy="148" r="3" fill="#00CCCC"/>
  <circle cx="160" cy="142" r="3" fill="#00CCCC"/>
  <circle cx="220" cy="140" r="3" fill="#00CCCC"/>

  <!-- X axis -->
  <line x1="35" y1="195" x2="258" y2="195" stroke="#1e3050" stroke-width="1"/>
  <text x="40" y="210" font-family="Arial" font-size="8" fill="#475569">Jan</text>
  <text x="90" y="210" font-family="Arial" font-size="8" fill="#475569">Mar</text>
  <text x="140" y="210" font-family="Arial" font-size="8" fill="#475569">May</text>
  <text x="190" y="210" font-family="Arial" font-size="8" fill="#475569">Jul</text>
  <text x="240" y="210" font-family="Arial" font-size="8" fill="#475569">Sep</text>

  <!-- Legend -->
  <rect x="38" y="76" width="8" height="8" rx="2" fill="#0078D7"/>
  <text x="50" y="84" font-family="Arial" font-size="8" fill="#94a3b8">Revenue</text>
  <rect x="110" y="76" width="8" height="8" rx="2" fill="#00CCCC"/>
  <text x="122" y="84" font-family="Arial" font-size="8" fill="#94a3b8">Conversions</text>

  <!-- Current value badge -->
  <rect x="210" y="68" width="52" height="22" rx="8" fill="rgba(0,120,215,0.2)" stroke="rgba(0,120,215,0.4)" stroke-width="1"/>
  <text x="236" y="83" font-family="Arial" font-size="11" font-weight="700" fill="url(#blue3)" text-anchor="middle">+24%</text>

  <!-- ══ RIGHT: Neural Network / AI ══ -->
  <rect x="288" y="30" width="250" height="200" rx="14" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <!-- Panel header -->
  <rect x="288" y="30" width="250" height="40" rx="14" fill="#0f2340"/>
  <rect x="288" y="52" width="250" height="18" fill="#0f2340"/>
  <circle cx="310" cy="50" r="6" fill="#00CCCC" opacity="0.8"/>
  <circle cx="325" cy="50" r="6" fill="#0078D7" opacity="0.6"/>
  <text x="344" y="54" font-family="Arial" font-size="11" font-weight="600" fill="#94a3b8">Neural Network AI</text>

  <!-- Neural net nodes - Layer 1 (input) -->
  <circle cx="316" cy="95"  r="10" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#neuronglow)"/>
  <circle cx="316" cy="130" r="10" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#neuronglow)"/>
  <circle cx="316" cy="165" r="10" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#neuronglow)"/>
  <circle cx="316" cy="200" r="10" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#neuronglow)"/>

  <!-- Input labels -->
  <text x="296" y="98" font-family="Arial" font-size="7" fill="#475569" text-anchor="end">DATA</text>
  <text x="296" y="133" font-family="Arial" font-size="7" fill="#475569" text-anchor="end">TEXT</text>
  <text x="296" y="168" font-family="Arial" font-size="7" fill="#475569" text-anchor="end">IMG</text>
  <text x="296" y="203" font-family="Arial" font-size="7" fill="#475569" text-anchor="end">API</text>

  <!-- Layer 2 (hidden 1) -->
  <circle cx="363" cy="108" r="10" fill="rgba(0,120,215,0.2)" stroke="#0078D7" stroke-width="1.5" filter="url(#neuronglow)"/>
  <circle cx="363" cy="140" r="10" fill="rgba(0,120,215,0.2)" stroke="#0078D7" stroke-width="1.5" filter="url(#neuronglow)"/>
  <circle cx="363" cy="172" r="10" fill="rgba(0,120,215,0.2)" stroke="#0078D7" stroke-width="1.5" filter="url(#neuronglow)"/>

  <!-- Layer 3 (hidden 2) -->
  <circle cx="413" cy="108" r="10" fill="rgba(0,204,204,0.2)" stroke="#00CCCC" stroke-width="1.5" filter="url(#neuronglow)"/>
  <circle cx="413" cy="140" r="10" fill="rgba(0,204,204,0.2)" stroke="#00CCCC" stroke-width="1.5" filter="url(#neuronglow)"/>
  <circle cx="413" cy="172" r="10" fill="rgba(0,204,204,0.2)" stroke="#00CCCC" stroke-width="1.5" filter="url(#neuronglow)"/>

  <!-- Layer 4 (output) -->
  <circle cx="460" cy="118" r="10" fill="rgba(0,120,215,0.3)" stroke="url(#blue3)" stroke-width="2" filter="url(#neuronglow)"/>
  <circle cx="460" cy="155" r="10" fill="rgba(0,120,215,0.3)" stroke="url(#blue3)" stroke-width="2" filter="url(#neuronglow)"/>
  <circle cx="460" cy="192" r="10" fill="rgba(0,120,215,0.3)" stroke="url(#blue3)" stroke-width="2" filter="url(#neuronglow)"/>

  <!-- Output labels -->
  <text x="476" y="121" font-family="Arial" font-size="7" fill="#00CCCC">PREDICT</text>
  <text x="476" y="158" font-family="Arial" font-size="7" fill="#00CCCC">CLASSIFY</text>
  <text x="476" y="195" font-family="Arial" font-size="7" fill="#00CCCC">ANALYZE</text>

  <!-- Connection lines layer 1 → 2 -->
  <g stroke="#0078D7" stroke-width="0.7" opacity="0.3">
    <line x1="326" y1="95"  x2="353" y2="108"/>
    <line x1="326" y1="95"  x2="353" y2="140"/>
    <line x1="326" y1="95"  x2="353" y2="172"/>
    <line x1="326" y1="130" x2="353" y2="108"/>
    <line x1="326" y1="130" x2="353" y2="140"/>
    <line x1="326" y1="130" x2="353" y2="172"/>
    <line x1="326" y1="165" x2="353" y2="108"/>
    <line x1="326" y1="165" x2="353" y2="140"/>
    <line x1="326" y1="165" x2="353" y2="172"/>
    <line x1="326" y1="200" x2="353" y2="108"/>
    <line x1="326" y1="200" x2="353" y2="140"/>
    <line x1="326" y1="200" x2="353" y2="172"/>
  </g>

  <!-- Connection lines layer 2 → 3 -->
  <g stroke="#0078D7" stroke-width="0.7" opacity="0.35">
    <line x1="373" y1="108" x2="403" y2="108"/>
    <line x1="373" y1="108" x2="403" y2="140"/>
    <line x1="373" y1="108" x2="403" y2="172"/>
    <line x1="373" y1="140" x2="403" y2="108"/>
    <line x1="373" y1="140" x2="403" y2="140"/>
    <line x1="373" y1="140" x2="403" y2="172"/>
    <line x1="373" y1="172" x2="403" y2="108"/>
    <line x1="373" y1="172" x2="403" y2="140"/>
    <line x1="373" y1="172" x2="403" y2="172"/>
  </g>

  <!-- Connection lines layer 3 → 4 -->
  <g stroke="#00CCCC" stroke-width="0.9" opacity="0.4">
    <line x1="423" y1="108" x2="450" y2="118"/>
    <line x1="423" y1="108" x2="450" y2="155"/>
    <line x1="423" y1="140" x2="450" y2="118"/>
    <line x1="423" y1="140" x2="450" y2="155"/>
    <line x1="423" y1="140" x2="450" y2="192"/>
    <line x1="423" y1="172" x2="450" y2="155"/>
    <line x1="423" y1="172" x2="450" y2="192"/>
  </g>

  <!-- ══ BOTTOM: 3 Metric Cards ══ -->
  <!-- Card 1 -->
  <rect x="22" y="248" width="163" height="118" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <rect x="34" y="262" width="34" height="34" rx="10" fill="rgba(0,120,215,0.15)" stroke="rgba(0,120,215,0.3)" stroke-width="1"/>
  <text x="51" y="284" font-family="Arial" font-size="18" text-anchor="middle" fill="#0078D7">📊</text>
  <text x="78" y="270" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">Insights/Day</text>
  <text x="78" y="290" font-family="Arial" font-size="22" font-weight="800" fill="url(#blue3)">1.2M</text>
  <text x="78" y="306" font-family="Arial" font-size="9" fill="#64748b">data points processed</text>
  <!-- Mini bar sparkline -->
  <g transform="translate(34,318)">
    <rect x="0"  y="15" width="8" height="10" rx="2" fill="#0078D7" opacity="0.5"/>
    <rect x="12" y="10" width="8" height="15" rx="2" fill="#0078D7" opacity="0.6"/>
    <rect x="24" y="6"  width="8" height="19" rx="2" fill="#0078D7" opacity="0.8"/>
    <rect x="36" y="2"  width="8" height="23" rx="2" fill="url(#blue3)" opacity="1" filter="url(#glow3)"/>
    <rect x="48" y="8"  width="8" height="17" rx="2" fill="#0078D7" opacity="0.6"/>
    <rect x="60" y="4"  width="8" height="21" rx="2" fill="#0078D7" opacity="0.9"/>
    <rect x="72" y="0"  width="8" height="25" rx="2" fill="url(#blue3)" opacity="1" filter="url(#glow3)"/>
    <rect x="84" y="5"  width="8" height="20" rx="2" fill="#0078D7" opacity="0.8"/>
    <rect x="96" y="1"  width="8" height="24" rx="2" fill="url(#blue3)" opacity="1" filter="url(#glow3)"/>
    <rect x="108" y="3" width="8" height="22" rx="2" fill="url(#blue3)" opacity="1" filter="url(#glow3)"/>
  </g>

  <!-- Card 2 -->
  <rect x="199" y="248" width="163" height="118" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <rect x="211" y="262" width="34" height="34" rx="10" fill="rgba(0,204,204,0.15)" stroke="rgba(0,204,204,0.3)" stroke-width="1"/>
  <text x="228" y="284" font-family="Arial" font-size="18" text-anchor="middle" fill="#00CCCC">🤖</text>
  <text x="256" y="270" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">AI Accuracy</text>
  <text x="256" y="290" font-family="Arial" font-size="22" font-weight="800" fill="#00CCCC">97.8%</text>
  <text x="256" y="306" font-family="Arial" font-size="9" fill="#64748b">prediction accuracy</text>
  <!-- Donut chart -->
  <circle cx="258" cy="342" r="18" fill="none" stroke="#1e3050" stroke-width="5"/>
  <circle cx="258" cy="342" r="18" fill="none" stroke="#00CCCC" stroke-width="5"
          stroke-dasharray="103 113" stroke-dashoffset="28" stroke-linecap="round" filter="url(#glow3)"/>
  <text x="258" y="346" font-family="Arial" font-size="8" font-weight="700" fill="#00CCCC" text-anchor="middle">97%</text>

  <!-- Card 3 -->
  <rect x="376" y="248" width="162" height="118" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <rect x="388" y="262" width="34" height="34" rx="10" fill="rgba(0,120,215,0.15)" stroke="rgba(0,120,215,0.3)" stroke-width="1"/>
  <text x="405" y="284" font-family="Arial" font-size="18" text-anchor="middle" fill="#0078D7">⚡</text>
  <text x="432" y="270" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">Process Speed</text>
  <text x="432" y="290" font-family="Arial" font-size="22" font-weight="800" fill="url(#blue3)">0.3ms</text>
  <text x="432" y="306" font-family="Arial" font-size="9" fill="#64748b">avg. response time</text>
  <!-- Speed gauge bars -->
  <g transform="translate(388,318)">
    <rect x="0"  y="0" width="148" height="6" rx="3" fill="#1e3050"/>
    <rect x="0"  y="0" width="140" height="6" rx="3" fill="url(#blue3)" filter="url(#glow3)"/>
    <text x="0"  y="22" font-family="Arial" font-size="8" fill="#94a3b8">Speed</text>
    <text x="148" y="22" font-family="Arial" font-size="8" fill="#00CCCC" text-anchor="end">94%</text>
    <rect x="0"  y="28" width="148" height="6" rx="3" fill="#1e3050"/>
    <rect x="0"  y="28" width="128" height="6" rx="3" fill="#0078D7" opacity="0.7"/>
    <text x="0"  y="48" font-family="Arial" font-size="8" fill="#94a3b8">Efficiency</text>
    <text x="148" y="48" font-family="Arial" font-size="8" fill="#0078D7" text-anchor="end">86%</text>
  </g>
</svg>

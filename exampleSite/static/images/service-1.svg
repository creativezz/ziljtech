<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D7"/>
      <stop offset="100%" stop-color="#00CCCC"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#091728"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="400" fill="url(#bg)" rx="16"/>

  <!-- Background glow blobs -->
  <ellipse cx="140" cy="180" rx="120" ry="100" fill="#0078D7" opacity="0.06"/>
  <ellipse cx="420" cy="220" rx="100" ry="80" fill="#00CCCC" opacity="0.06"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#0078D7" stroke-width="1">
    <line x1="0" y1="80" x2="560" y2="80"/>
    <line x1="0" y1="160" x2="560" y2="160"/>
    <line x1="0" y1="240" x2="560" y2="240"/>
    <line x1="0" y1="320" x2="560" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
  </g>

  <!-- ── Main dashboard card ── -->
  <rect x="30" y="30" width="310" height="210" rx="14" fill="url(#card1)" stroke="#1e3050" stroke-width="1.5"/>

  <!-- Card header -->
  <rect x="30" y="30" width="310" height="44" rx="14" fill="#0f2340"/>
  <rect x="30" y="56" width="310" height="18" fill="#0f2340"/>
  <circle cx="54" cy="52" r="7" fill="#0078D7" opacity="0.8"/>
  <circle cx="72" cy="52" r="7" fill="#00CCCC" opacity="0.6"/>
  <circle cx="90" cy="52" r="7" fill="#1e3050"/>
  <text x="115" y="57" font-family="Arial" font-size="12" font-weight="600" fill="#94a3b8">Digital Transformation Dashboard</text>

  <!-- Chart bars -->
  <g>
    <!-- Bar group 1 -->
    <rect x="58" y="145" width="22" height="65" rx="4" fill="url(#blue)" opacity="0.9"/>
    <rect x="84" y="165" width="22" height="45" rx="4" fill="#1e3050"/>
    <!-- Bar group 2 -->
    <rect x="122" y="120" width="22" height="90" rx="4" fill="url(#blue)" opacity="0.9"/>
    <rect x="148" y="145" width="22" height="65" rx="4" fill="#1e3050"/>
    <!-- Bar group 3 -->
    <rect x="186" y="100" width="22" height="110" rx="4" fill="url(#blue)" opacity="0.9" filter="url(#glow)"/>
    <rect x="212" y="125" width="22" height="85" rx="4" fill="#1e3050"/>
    <!-- Bar group 4 -->
    <rect x="250" y="130" width="22" height="80" rx="4" fill="url(#blue)" opacity="0.7"/>
    <rect x="276" y="150" width="22" height="60" rx="4" fill="#1e3050"/>
  </g>

  <!-- X-axis line -->
  <line x1="48" y1="214" x2="322" y2="214" stroke="#1e3050" stroke-width="1"/>
  <!-- X labels -->
  <text x="60" y="228" font-family="Arial" font-size="9" fill="#475569">Q1</text>
  <text x="124" y="228" font-family="Arial" font-size="9" fill="#475569">Q2</text>
  <text x="188" y="228" font-family="Arial" font-size="9" fill="#475569">Q3</text>
  <text x="252" y="228" font-family="Arial" font-size="9" fill="#475569">Q4</text>

  <!-- Legend -->
  <rect x="48" y="85" width="10" height="10" rx="2" fill="url(#blue)"/>
  <text x="62" y="94" font-family="Arial" font-size="9" fill="#94a3b8">Revenue Growth</text>
  <rect x="148" y="85" width="10" height="10" rx="2" fill="#1e3050"/>
  <text x="162" y="94" font-family="Arial" font-size="9" fill="#94a3b8">Baseline</text>

  <!-- ── Floating metric cards ── -->
  <!-- Card 2: top right -->
  <rect x="360" y="30" width="168" height="82" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <rect x="374" y="48" width="36" height="36" rx="10" fill="rgba(0,120,215,0.15)" stroke="rgba(0,120,215,0.3)" stroke-width="1"/>
  <text x="392" y="70" font-family="Arial" font-size="18" text-anchor="middle" fill="#0078D7">⚡</text>
  <text x="420" y="56" font-family="Arial" font-size="11" font-weight="700" fill="#F8F9FA">Efficiency</text>
  <text x="420" y="72" font-family="Arial" font-size="22" font-weight="800" fill="url(#blue)">+40%</text>
  <text x="420" y="88" font-family="Arial" font-size="9" fill="#64748b">vs last quarter</text>

  <!-- Card 3: middle right -->
  <rect x="360" y="128" width="168" height="82" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <rect x="374" y="146" width="36" height="36" rx="10" fill="rgba(0,204,204,0.15)" stroke="rgba(0,204,204,0.3)" stroke-width="1"/>
  <text x="392" y="168" font-family="Arial" font-size="18" text-anchor="middle" fill="#00CCCC">🚀</text>
  <text x="420" y="154" font-family="Arial" font-size="11" font-weight="700" fill="#F8F9FA">Time to Market</text>
  <text x="420" y="170" font-family="Arial" font-size="22" font-weight="800" fill="#00CCCC">3×</text>
  <text x="420" y="186" font-family="Arial" font-size="9" fill="#64748b">faster delivery</text>

  <!-- Card 4: bottom right -->
  <rect x="360" y="226" width="168" height="82" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <rect x="374" y="244" width="36" height="36" rx="10" fill="rgba(0,120,215,0.15)" stroke="rgba(0,120,215,0.3)" stroke-width="1"/>
  <text x="392" y="266" font-family="Arial" font-size="18" text-anchor="middle" fill="#0078D7">💡</text>
  <text x="420" y="252" font-family="Arial" font-size="11" font-weight="700" fill="#F8F9FA">Cost Reduction</text>
  <text x="420" y="268" font-family="Arial" font-size="22" font-weight="800" fill="url(#blue)">-35%</text>
  <text x="420" y="284" font-family="Arial" font-size="9" fill="#64748b">operational costs</text>

  <!-- ── Progress / pipeline card ── -->
  <rect x="30" y="258" width="310" height="118" rx="14" fill="url(#card1)" stroke="#1e3050" stroke-width="1.5"/>
  <text x="48" y="282" font-family="Arial" font-size="12" font-weight="700" fill="#F8F9FA">Transformation Pipeline</text>

  <!-- Progress bars -->
  <text x="48" y="304" font-family="Arial" font-size="10" fill="#94a3b8">Cloud Migration</text>
  <rect x="148" y="292" width="168" height="8" rx="4" fill="#1e3050"/>
  <rect x="148" y="292" width="142" height="8" rx="4" fill="url(#blue)" filter="url(#glow)"/>
  <text x="322" y="302" font-family="Arial" font-size="9" fill="#00CCCC">85%</text>

  <text x="48" y="324" font-family="Arial" font-size="10" fill="#94a3b8">AI Integration</text>
  <rect x="148" y="312" width="168" height="8" rx="4" fill="#1e3050"/>
  <rect x="148" y="312" width="118" height="8" rx="4" fill="url(#blue)" opacity="0.8"/>
  <text x="322" y="322" font-family="Arial" font-size="9" fill="#00CCCC">70%</text>

  <text x="48" y="344" font-family="Arial" font-size="10" fill="#94a3b8">Security Audit</text>
  <rect x="148" y="332" width="168" height="8" rx="4" fill="#1e3050"/>
  <rect x="148" y="332" width="158" height="8" rx="4" fill="url(#blue)" opacity="0.9"/>
  <text x="322" y="342" font-family="Arial" font-size="9" fill="#00CCCC">94%</text>

  <text x="48" y="364" font-family="Arial" font-size="10" fill="#94a3b8">Data Analytics</text>
  <rect x="148" y="352" width="168" height="8" rx="4" fill="#1e3050"/>
  <rect x="148" y="352" width="96" height="8" rx="4" fill="url(#blue)" opacity="0.7"/>
  <text x="322" y="362" font-family="Arial" font-size="9" fill="#00CCCC">57%</text>

  <!-- Glow accent -->
  <ellipse cx="197" cy="155" rx="40" ry="30" fill="#0078D7" opacity="0.08" filter="url(#softglow)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060f1e"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="blueBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D7"/>
      <stop offset="100%" stop-color="#00CCCC"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#091728"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0078D7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0078D7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowBanner">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlob">
      <feGaussianBlur stdDeviation="30" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" fill="url(#bgBanner)" rx="20"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="180" cy="260" rx="200" ry="160" fill="#0078D7" opacity="0.05" filter="url(#softBlob)"/>
  <ellipse cx="540" cy="200" rx="180" ry="140" fill="#00CCCC" opacity="0.05" filter="url(#softBlob)"/>
  <ellipse cx="350" cy="480" rx="220" ry="100" fill="#0078D7" opacity="0.04" filter="url(#softBlob)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#0078D7" stroke-width="1">
    <line x1="0" y1="65" x2="700" y2="65"/>
    <line x1="0" y1="130" x2="700" y2="130"/>
    <line x1="0" y1="195" x2="700" y2="195"/>
    <line x1="0" y1="260" x2="700" y2="260"/>
    <line x1="0" y1="325" x2="700" y2="325"/>
    <line x1="0" y1="390" x2="700" y2="390"/>
    <line x1="0" y1="455" x2="700" y2="455"/>
    <line x1="70"  y1="0" x2="70"  y2="520"/>
    <line x1="140" y1="0" x2="140" y2="520"/>
    <line x1="210" y1="0" x2="210" y2="520"/>
    <line x1="280" y1="0" x2="280" y2="520"/>
    <line x1="350" y1="0" x2="350" y2="520"/>
    <line x1="420" y1="0" x2="420" y2="520"/>
    <line x1="490" y1="0" x2="490" y2="520"/>
    <line x1="560" y1="0" x2="560" y2="520"/>
    <line x1="630" y1="0" x2="630" y2="520"/>
  </g>

  <!-- Floating particles -->
  <circle cx="60"  cy="80"  r="2" fill="#0078D7" opacity="0.5"/>
  <circle cx="140" cy="45"  r="1.5" fill="#00CCCC" opacity="0.4"/>
  <circle cx="620" cy="70"  r="2" fill="#0078D7" opacity="0.4"/>
  <circle cx="660" cy="150" r="1.5" fill="#00CCCC" opacity="0.5"/>
  <circle cx="30"  cy="380" r="2" fill="#00CCCC" opacity="0.4"/>
  <circle cx="680" cy="420" r="1.5" fill="#0078D7" opacity="0.5"/>

  <!-- Central: Large Dashboard Window -->
  <rect x="100" y="60" width="500" height="290" rx="16" fill="url(#cardGrad)" stroke="#1e3050" stroke-width="1.5" filter="url(#cardShadow)"/>

  <!-- Window chrome -->
  <rect x="100" y="60" width="500" height="46" rx="16" fill="#0f2340"/>
  <rect x="100" y="88" width="500" height="18" fill="#0f2340"/>
  <circle cx="128" cy="83" r="7" fill="#ef4444" opacity="0.7"/>
  <circle cx="148" cy="83" r="7" fill="#f59e0b" opacity="0.7"/>
  <circle cx="168" cy="83" r="7" fill="#22c55e" opacity="0.7"/>
  <rect x="230" y="75" width="240" height="16" rx="4" fill="#1e3050" opacity="0.6"/>
  <text x="350" y="87" font-family="Arial" font-size="10" fill="#64748b" text-anchor="middle">ZILJ Tech — AI Command Center</text>

  <!-- Top stat row inside dashboard -->
  <rect x="118" y="120" width="100" height="60" rx="10" fill="#0A192F" stroke="#1e3050" stroke-width="1"/>
  <text x="168" y="140" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Projects Delivered</text>
  <text x="168" y="162" font-family="Arial" font-size="22" font-weight="800" fill="url(#blueBanner)" text-anchor="middle" filter="url(#glowBanner)">50+</text>

  <rect x="232" y="120" width="100" height="60" rx="10" fill="#0A192F" stroke="#1e3050" stroke-width="1"/>
  <text x="282" y="140" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Happy Clients</text>
  <text x="282" y="162" font-family="Arial" font-size="22" font-weight="800" fill="url(#blueBanner)" text-anchor="middle" filter="url(#glowBanner)">30+</text>

  <rect x="346" y="120" width="100" height="60" rx="10" fill="#0A192F" stroke="#1e3050" stroke-width="1"/>
  <text x="396" y="140" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Years Experience</text>
  <text x="396" y="162" font-family="Arial" font-size="22" font-weight="800" fill="url(#blueBanner)" text-anchor="middle" filter="url(#glowBanner)">5+</text>

  <rect x="460" y="120" width="122" height="60" rx="10" fill="#0A192F" stroke="#1e3050" stroke-width="1"/>
  <text x="521" y="140" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">Uptime SLA</text>
  <text x="521" y="162" font-family="Arial" font-size="22" font-weight="800" fill="#00CCCC" text-anchor="middle" filter="url(#glowBanner)">99.9%</text>

  <!-- Area chart -->
  <polygon points="118,295 145,268 175,252 210,238 245,244 280,220 315,210 345,198 375,215 410,192 445,180 475,168 500,155 530,162 558,145 580,155 582,295"
           fill="url(#areaFill)" opacity="0.4"/>
  <polyline points="118,295 145,268 175,252 210,238 245,244 280,220 315,210 345,198 375,215 410,192 445,180 475,168 500,155 530,162 558,145 580,155"
            fill="none" stroke="url(#blueBanner)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowBanner)"/>

  <!-- Cyan secondary line -->
  <polyline points="118,295 145,280 175,272 210,265 245,270 280,258 315,248 345,252 375,262 410,248 445,240 475,232 500,245 530,238 558,228 580,235"
            fill="none" stroke="#00CCCC" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- X axis -->
  <line x1="118" y1="300" x2="582" y2="300" stroke="#1e3050" stroke-width="1"/>
  <text x="140" y="315" font-family="Arial" font-size="8" fill="#334155">Q1</text>
  <text x="220" y="315" font-family="Arial" font-size="8" fill="#334155">Q2</text>
  <text x="310" y="315" font-family="Arial" font-size="8" fill="#334155">Q3</text>
  <text x="400" y="315" font-family="Arial" font-size="8" fill="#334155">Q4</text>
  <text x="490" y="315" font-family="Arial" font-size="8" fill="#334155">Q5</text>
  <text x="560" y="315" font-family="Arial" font-size="8" fill="#334155">Q6</text>

  <!-- Chart legend -->
  <rect x="120" y="330" width="8" height="8" rx="2" fill="url(#blueBanner)"/>
  <text x="132" y="338" font-family="Arial" font-size="9" fill="#94a3b8">Revenue Growth</text>
  <rect x="230" y="330" width="8" height="8" rx="2" fill="#00CCCC" opacity="0.7"/>
  <text x="242" y="338" font-family="Arial" font-size="9" fill="#94a3b8">Client Satisfaction</text>

  <!-- Active badge on chart -->
  <rect x="540" y="138" width="46" height="22" rx="8" fill="rgba(0,204,204,0.2)" stroke="rgba(0,204,204,0.4)" stroke-width="1"/>
  <text x="563" y="153" font-family="Arial" font-size="11" font-weight="700" fill="#00CCCC" text-anchor="middle">+38%</text>

  <!-- Bottom row: 4 service chips -->
  <!-- Chip 1 -->
  <rect x="100" y="376" width="112" height="52" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="124" y="394" font-family="Arial" font-size="16">&#x2601;&#xFE0F;</text>
  <text x="150" y="394" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">Cloud</text>
  <text x="150" y="408" font-family="Arial" font-size="8" fill="#64748b">DevOps &amp; Infra</text>
  <text x="150" y="422" font-family="Arial" font-size="9" font-weight="700" fill="#0078D7">Active</text>

  <!-- Chip 2 -->
  <rect x="224" y="376" width="112" height="52" rx="12" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#glowBanner)"/>
  <text x="248" y="394" font-family="Arial" font-size="16">&#x1F916;</text>
  <text x="274" y="394" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">AI / ML</text>
  <text x="274" y="408" font-family="Arial" font-size="8" fill="#64748b">Automation</text>
  <text x="274" y="422" font-family="Arial" font-size="9" font-weight="700" fill="#00CCCC">Active</text>

  <!-- Chip 3 -->
  <rect x="348" y="376" width="112" height="52" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="372" y="394" font-family="Arial" font-size="16">&#x1F510;</text>
  <text x="398" y="394" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">Security</text>
  <text x="398" y="408" font-family="Arial" font-size="8" fill="#64748b">Zero-Trust</text>
  <text x="398" y="422" font-family="Arial" font-size="9" font-weight="700" fill="#0078D7">Active</text>

  <!-- Chip 4 -->
  <rect x="472" y="376" width="128" height="52" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="496" y="394" font-family="Arial" font-size="16">&#x1F4F1;</text>
  <text x="522" y="394" font-family="Arial" font-size="10" font-weight="700" fill="#F8F9FA">Mobile</text>
  <text x="522" y="408" font-family="Arial" font-size="8" fill="#64748b">iOS &amp; Android</text>
  <text x="522" y="422" font-family="Arial" font-size="9" font-weight="700" fill="#0078D7">Active</text>

  <!-- Floating accent cards -->
  <!-- Top left -->
  <rect x="18" y="90" width="72" height="72" rx="14" fill="#0d2137" stroke="#0078D7" stroke-width="1.5" filter="url(#glowBanner)"/>
  <text x="54" y="122" font-family="Arial" font-size="22" text-anchor="middle" fill="#0078D7">&#x1F4A1;</text>
  <text x="54" y="140" font-family="Arial" font-size="8" fill="#94a3b8" text-anchor="middle">Innovation</text>
  <text x="54" y="154" font-family="Arial" font-size="10" font-weight="700" fill="url(#blueBanner)" text-anchor="middle">First</text>

  <!-- Top right -->
  <rect x="610" y="90" width="72" height="72" rx="14" fill="#0d2137" stroke="#00CCCC" stroke-width="1.5" filter="url(#glowBanner)"/>
  <text x="646" y="122" font-family="Arial" font-size="22" text-anchor="middle" fill="#00CCCC">&#x26A1;</text>
  <text x="646" y="140" font-family="Arial" font-size="8" fill="#94a3b8" text-anchor="middle">Fast Deploy</text>
  <text x="646" y="154" font-family="Arial" font-size="10" font-weight="700" fill="#00CCCC" text-anchor="middle">3x Speed</text>

  <!-- Bottom left -->
  <rect x="18" y="290" width="72" height="60" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="54" y="316" font-family="Arial" font-size="18" text-anchor="middle" fill="#22c55e">&#x2713;</text>
  <text x="54" y="332" font-family="Arial" font-size="8" fill="#94a3b8" text-anchor="middle">ISO Ready</text>
  <text x="54" y="346" font-family="Arial" font-size="9" font-weight="700" fill="#22c55e" text-anchor="middle">Certified</text>

  <!-- Bottom right -->
  <rect x="610" y="290" width="72" height="60" rx="12" fill="#0d2137" stroke="#1e3050" stroke-width="1.5"/>
  <text x="646" y="316" font-family="Arial" font-size="18" text-anchor="middle" fill="#f59e0b">&#x1F30D;</text>
  <text x="646" y="332" font-family="Arial" font-size="8" fill="#94a3b8" text-anchor="middle">Global</text>
  <text x="646" y="346" font-family="Arial" font-size="9" font-weight="700" fill="#f59e0b" text-anchor="middle">Clients</text>

  <!-- Connection lines from central card to accent cards -->
  <line x1="90" y1="126" x2="100" y2="140" stroke="#0078D7" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="610" y1="126" x2="600" y2="140" stroke="#00CCCC" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
  <line x1="90" y1="320" x2="100" y2="295" stroke="#0078D7" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
  <line x1="610" y1="320" x2="600" y2="295" stroke="#0078D7" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
</svg>
